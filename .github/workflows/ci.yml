name: Node.js Continous Integration

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test-automation:
    runs-on: ubuntu-latest

    steps:
    - name: 1. Ambil source code dari repository
      uses: actions/checkout@v4

    - name: 2. Setup lingkungan Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: 3. Install depedencies aplikasi
      run:  npm ci

    - name: 4. Eksekusi Automated Testing
      run: npm test